version: 1
services:
  - serviceId: gateway
    modulePath: Forgex_MOM/Forgex_Backend/Forgex_Gateway
    artifactName: forgex-gateway.jar
    defaultPort: 9000
    winswServiceName: forgex-gateway-{INSTANCE_CODE}
    composeServiceName: forgex-gateway
    requiresLicenseCheck: true
  - serviceId: auth
    modulePath: Forgex_MOM/Forgex_Backend/Forgex_Auth
    artifactName: forgex-auth.jar
    defaultPort: 9001
    winswServiceName: forgex-auth-{INSTANCE_CODE}
    composeServiceName: forgex-auth
    requiresLicenseCheck: false
  - serviceId: sys
    modulePath: Forgex_MOM/Forgex_Backend/Forgex_Sys
    artifactName: forgex-sys.jar
    defaultPort: 9002
    winswServiceName: forgex-sys-{INSTANCE_CODE}
    composeServiceName: forgex-sys
    requiresLicenseCheck: true
  - serviceId: basic
    modulePath: Forgex_MOM/Forgex_Backend/Forgex_Basic
    artifactName: forgex-basic.jar
    defaultPort: 9003
    winswServiceName: forgex-basic-{INSTANCE_CODE}
    composeServiceName: forgex-basic
    requiresLicenseCheck: false
  - serviceId: job
    modulePath: Forgex_MOM/Forgex_Backend/Forgex_Job
    artifactName: forgex-job.jar
    defaultPort: 9004
    winswServiceName: forgex-job-{INSTANCE_CODE}
    composeServiceName: forgex-job
    requiresLicenseCheck: true
  - serviceId: integration
    modulePath: Forgex_MOM/Forgex_Backend/Forgex_Integration
    artifactName: forgex-integration.jar
    defaultPort: 9007
    winswServiceName: forgex-integration-{INSTANCE_CODE}
    composeServiceName: forgex-integration
    requiresLicenseCheck: false
  - serviceId: workflow
    modulePath: Forgex_MOM/Forgex_Backend/Forgex_Workflow
    artifactName: forgex-workflow.jar
    defaultPort: 9005
    winswServiceName: forgex-workflow-{INSTANCE_CODE}
    composeServiceName: forgex-workflow
    requiresLicenseCheck: false
  - serviceId: report
    modulePath: Forgex_MOM/Forgex_Backend/Forgex_Report
    artifactName: forgex-report.jar
    defaultPort: 8084
    winswServiceName: forgex-report-{INSTANCE_CODE}
    composeServiceName: forgex-report
    requiresLicenseCheck: false
