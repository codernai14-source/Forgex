spring:
  application:
    name: forgex-auth
  profiles:
    active: dev
  datasource:
    type: com.baomidou.dynamic.datasource.DynamicRoutingDataSource
  config:
    import:
      - nacos:common.yml
      - nacos:datasource-forgex-dev.yml
      - nacos:redis.yml
      - nacos:rocketmq.yml
      - nacos:sa-token.yml
      - nacos:captcha.yaml
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.0.126:8848
        namespace: dev
        group: DEFAULT_GROUP
      config:
        server-addr: 192.168.0.126:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yml
  output:
    ansi:
      enabled: always
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} - %msg%n"
  charset:
    console: UTF-8
  level:
    root: INFO
  group: {}
server:
  port: 9001

