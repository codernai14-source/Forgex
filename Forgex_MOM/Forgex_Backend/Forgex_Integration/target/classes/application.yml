spring:
  application:
    name: forgex-integration
  datasource:
    type: com.baomidou.dynamic.datasource.DynamicRoutingDataSource
  config:
    import:
      - nacos:common.yml
      - nacos:datasource-forgex-integration-dev.yml
      - nacos:redis.yml
      - nacos:rocketmq.yml
      - nacos:sa-token.yml
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.0.126:8848
        namespace: dev
        group: DEFAULT_GROUP
      config:
        server-addr: 192.168.0.126:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yml
  output:
    ansi:
      enabled: always
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  port: 9004

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.forgex.integration.domain.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} - %msg%n"
  charset:
    console: UTF-8
  level:
    root: INFO
    com.forgex.integration: DEBUG
