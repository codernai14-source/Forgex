spring:
  application:
    name: forgex-gateway
  config:
    import:
      - nacos:common.yml
      - nacos:redis.yml
      - optional:nacos:sa-token.yml
  output:
    ansi:
      enabled: always
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration
      - com.baomidou.dynamic.datasource.spring.boot.autoconfigure.DynamicDataSourceAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.jdbc.DataSourceHealthContributorAutoConfiguration
  codec:
    multipart:
      max-in-memory-size: 209715200
      max-parts: 10
  cloud:
    nacos:
      discovery:
        server-addr: ${FORGEX_NACOS_ADDR:127.0.0.1:8848}
        namespace: ${FORGEX_NACOS_NAMESPACE:dev}
        group: ${FORGEX_NACOS_GROUP:DEFAULT_GROUP}
        ip: ${FORGEX_NACOS_DISCOVERY_IP:127.0.0.1}
      config:
        server-addr: ${FORGEX_NACOS_ADDR:127.0.0.1:8848}
        namespace: ${FORGEX_NACOS_NAMESPACE:dev}
        group: ${FORGEX_NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        import-check:
          enabled: false
    gateway:
      server:
        webflux:
          filter:
            json-to-grpc:
              enabled: false
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: "*"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                exposed-headers:
                  - Content-Disposition
                allow-credentials: true
                max-age: 3600
          routes:
            - id: api-auth
              uri: lb://forgex-auth
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: ${FORGEX_GATEWAY_AUTH_RATE:300}
                    redis-rate-limiter.burstCapacity: ${FORGEX_GATEWAY_AUTH_BURST:600}
            - id: api-sys
              uri: lb://forgex-sys
              predicates:
                - Path=/api/sys/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: ${FORGEX_GATEWAY_SYS_RATE:1000}
                    redis-rate-limiter.burstCapacity: ${FORGEX_GATEWAY_SYS_BURST:3000}
                - name: CircuitBreaker
                  args:
                    name: api-sys
                    fallbackUri: forward:/fallback/sys
            - id: api-basic
              uri: lb://forgex-basic
              predicates:
                - Path=/api/basic/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: ${FORGEX_GATEWAY_BASIC_RATE:1000}
                    redis-rate-limiter.burstCapacity: ${FORGEX_GATEWAY_BASIC_BURST:3000}
                - name: CircuitBreaker
                  args:
                    name: api-basic
                    fallbackUri: forward:/fallback/basic
            - id: api-files
              uri: lb://forgex-sys
              predicates:
                - Path=/api/files/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: ${FORGEX_GATEWAY_FILES_RATE:1000}
                    redis-rate-limiter.burstCapacity: ${FORGEX_GATEWAY_FILES_BURST:3000}
                - name: CircuitBreaker
                  args:
                    name: api-files
                    fallbackUri: forward:/fallback/files
            - id: api-wf
              uri: lb://forgex-workflow
              predicates:
                - Path=/api/wf/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: ${FORGEX_GATEWAY_WF_RATE:1000}
                    redis-rate-limiter.burstCapacity: ${FORGEX_GATEWAY_WF_BURST:3000}
                - name: CircuitBreaker
                  args:
                    name: api-wf
                    fallbackUri: forward:/fallback/sys
            - id: api-app
              uri: lb://forgex-sys
              predicates:
                - Path=/api/app/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: ${FORGEX_GATEWAY_APP_RATE:1000}
                    redis-rate-limiter.burstCapacity: ${FORGEX_GATEWAY_APP_BURST:3000}
                - name: CircuitBreaker
                  args:
                    name: api-app
                    fallbackUri: forward:/fallback/sys
            - id: api-integration
              uri: lb://forgex-integration
              predicates:
                - Path=/api/integration/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: ${FORGEX_GATEWAY_INTEGRATION_RATE:1000}
                    redis-rate-limiter.burstCapacity: ${FORGEX_GATEWAY_INTEGRATION_BURST:3000}
                - name: CircuitBreaker
                  args:
                    name: api-integration
                    fallbackUri: forward:/fallback/sys
            - id: api-report
              uri: lb://forgex-report
              predicates:
                - Path=/api/report/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: ${FORGEX_GATEWAY_REPORT_RATE:1000}
                    redis-rate-limiter.burstCapacity: ${FORGEX_GATEWAY_REPORT_BURST:3000}
                - name: CircuitBreaker
                  args:
                    name: api-report
                    fallbackUri: forward:/fallback/sys
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
  main:
    web-application-type: reactive

resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 10s

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} - %msg%n"
  charset:
    console: UTF-8

server:
  port: ${FORGEX_GATEWAY_PORT:9000}

forgex:
  deployment:
    profile: ${FORGEX_DEPLOYMENT_PROFILE:dev}
    instance-code: ${FORGEX_INSTANCE_CODE:DEFAULT}
    home: ${FORGEX_HOME:./forgex}
    license-dir: ${FORGEX_LICENSE_DIR:${FORGEX_HOME:./forgex}/license}
    upload-dir: ${FORGEX_UPLOAD_DIR:${FORGEX_HOME:./forgex}/data/uploads}
    log-dir: ${FORGEX_LOG_DIR:${FORGEX_HOME:./forgex}/logs}
    backup-dir: ${FORGEX_BACKUP_DIR:${FORGEX_HOME:./forgex}/backup}
    nacos-addr: ${FORGEX_NACOS_ADDR:127.0.0.1:8848}
    redis-addr: ${FORGEX_REDIS_ADDR:175.27.135.204:6379}
    mysql-url: ${FORGEX_MYSQL_URL:}
  license:
    enabled: ${FORGEX_LICENSE_ENABLED:true}
    public-key: ${FORGEX_LICENSE_PUBLIC_KEY:}
    public-key-file-name: ${FORGEX_LICENSE_PUBLIC_KEY_FILE_NAME:public-key.base64}
    file-name: ${FORGEX_LICENSE_FILE_NAME:license.lic}
    request-info-file-name: ${FORGEX_REQUEST_INFO_FILE_NAME:request-info.json}
    history-file-name: ${FORGEX_LICENSE_HISTORY_FILE_NAME:activation-history.json}
    override-machine-code: ${FORGEX_MACHINE_CODE:}
    customer-code-prefix: ${FORGEX_CUSTOMER_CODE_PREFIX:FXC}
    warning-days: ${FORGEX_LICENSE_WARNING_DAYS:30}
