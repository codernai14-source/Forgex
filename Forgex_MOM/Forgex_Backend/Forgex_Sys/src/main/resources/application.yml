spring:
  application:
    name: forgex-sys
  datasource:
    type: com.baomidou.dynamic.datasource.DynamicRoutingDataSource
  config:
    import:
      - nacos:common.yml
      - nacos:datasource-forgex-dev.yml
      - nacos:redis.yml
      - nacos:rocketmq.yml
      - nacos:sa-token.yml
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
        group: DEFAULT_GROUP
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yml
  output:
    ansi:
      enabled: always
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
file:
  upload:
    path: D:/forgex/uploads
  access:
    prefix: /files
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} - %msg%n"
  charset:
    console: UTF-8
  level:
    root: INFO
server:
  port: 9002

# 仪表盘与产品信息（可被 Nacos 覆盖）
forgex:
  application:
    version: 1.0.0
  dashboard:
    map-longitude: 116.407526
    map-latitude: 39.90403
    map-location-name: 北京市
