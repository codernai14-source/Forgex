spring:
  application:
    name: forgex-sys
  config:
    import:
      - nacos:common.yml
      - nacos:${FORGEX_DATASOURCE_CONFIG:datasource-forgex-dev.yml}
      - nacos:redis.yml
      - nacos:rocketmq.yml
      - optional:nacos:sa-token.yml
  datasource:
    type: com.baomidou.dynamic.datasource.DynamicRoutingDataSource
  output:
    ansi:
      enabled: always
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  cloud:
    nacos:
      discovery:
        server-addr: ${FORGEX_NACOS_ADDR:127.0.0.1:8848}
        namespace: ${FORGEX_NACOS_NAMESPACE:dev}
        group: ${FORGEX_NACOS_GROUP:DEFAULT_GROUP}
        ip: ${FORGEX_NACOS_DISCOVERY_IP:127.0.0.1}
      config:
        server-addr: ${FORGEX_NACOS_ADDR:127.0.0.1:8848}
        namespace: ${FORGEX_NACOS_NAMESPACE:dev}
        group: ${FORGEX_NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        import-check:
          enabled: false

file:
  upload:
    path: ${FORGEX_UPLOAD_DIR:${FORGEX_HOME:C:/forgex}/data/uploads}
  access:
    prefix: /files

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} - %msg%n"
  charset:
    console: UTF-8
  level:
    root: INFO

server:
  port: ${FORGEX_SYS_PORT:9002}

forgex:
  deployment:
    profile: ${FORGEX_DEPLOYMENT_PROFILE:dev}
    instance-code: ${FORGEX_INSTANCE_CODE:DEFAULT}
    home: ${FORGEX_HOME:C:/forgex}
    license-dir: ${FORGEX_LICENSE_DIR:${FORGEX_HOME:C:/forgex}/license}
    upload-dir: ${FORGEX_UPLOAD_DIR:${FORGEX_HOME:C:/forgex}/data/uploads}
    log-dir: ${FORGEX_LOG_DIR:${FORGEX_HOME:C:/forgex}/logs}
    backup-dir: ${FORGEX_BACKUP_DIR:${FORGEX_HOME:C:/forgex}/backup}
    nacos-addr: ${FORGEX_NACOS_ADDR:127.0.0.1:8848}
    redis-addr: ${FORGEX_REDIS_ADDR:175.27.135.204:6379}
    mysql-url: ${FORGEX_MYSQL_URL:}
  license:
    enabled: ${FORGEX_LICENSE_ENABLED:true}
    public-key: ${FORGEX_LICENSE_PUBLIC_KEY:}
    public-key-file-name: ${FORGEX_LICENSE_PUBLIC_KEY_FILE_NAME:public-key.base64}
    file-name: ${FORGEX_LICENSE_FILE_NAME:license.lic}
    request-info-file-name: ${FORGEX_REQUEST_INFO_FILE_NAME:request-info.json}
    history-file-name: ${FORGEX_LICENSE_HISTORY_FILE_NAME:activation-history.json}
    override-machine-code: ${FORGEX_MACHINE_CODE:}
    customer-code-prefix: ${FORGEX_CUSTOMER_CODE_PREFIX:FXC}
    warning-days: ${FORGEX_LICENSE_WARNING_DAYS:30}
    scheduler-enabled: ${FORGEX_LICENSE_SCHEDULER_ENABLED:true}
    refresh-interval-ms: ${FORGEX_LICENSE_REFRESH_INTERVAL_MS:900000}
  application:
    version: 1.0.0
  dashboard:
    map-longitude: 116.407526
    map-latitude: 39.90403
    map-location-name: Beijing
